name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      # Using `npm install` (not `npm ci`) so the lockfile is reconciled with the
      # newly added dev tooling. Switch to `npm ci` once the lockfile is
      # regenerated on a machine with Node installed.
      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Dummy values so the production build (which evaluates client/server
          # modules) doesn't fail on missing env. No real secrets are needed to
          # compile — the app connects to these only at request time.
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build

      # Non-blocking for now. ESLint surfaces pre-existing findings in code that
      # predates it; `continue-on-error` keeps the step visible without failing
      # the run (note: it also reports the step conclusion as "success" even when
      # eslint exits non-zero). Fas 2 sweeps the findings, then this flips to a
      # real blocking gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Temporary diagnostic: publish eslint findings as annotations so they're
      # readable via the public check-runs API (raw log download is blocked on
      # some corporate networks). Removed once lint is clean and blocking.
      - name: Lint findings (annotations)
        if: always()
        continue-on-error: true
        run: |
          npx eslint . -f json -o eslint-report.json || true
          node scripts/eslint-annotate.mjs
